name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r edict/backend/requirements.txt || true
      - name: Run mock tests
        run: pytest tests/test_dashboard_sync.py tests/test_kanban.py -v

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check Python syntax
        run: |
          python -m py_compile dashboard/server.py
          python -m py_compile scripts/kanban_update.py
          python -m py_compile scripts/edict_client.py
          echo "All files compile OK"
